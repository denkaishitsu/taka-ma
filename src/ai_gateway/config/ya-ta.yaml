# ya-ta 設定
ya-ta:
  model: "qwen3.6:27b-q4_K_M" # タスク分解・分類・リスク判定に使うモデル（ollama HTTP API 経由）。
                              # deepseek-r1:32b から入替（設計書 §2.2: GPQA 62.1→87.8 ほか全項目優位・
                              # 4bit 19GB→17GB）
  llm_timeout_sec: 300        # 分解・分類・リスク判定 1 回のタイムアウト。旧値 60 秒は正常分解の
                              # 実測 58 秒と同水準で、正常動作でも受付失敗する際どい設定だった。
                              # 思考型モデルは思考が長引き得るため余裕を大きく取る。実測ログ
                              # （llm.py の total_duration INFO）が溜まったら p95 基準で見直す（§8.4）
  correction_timeout_sec: 60  # 計画プレビューの自然言語訂正（PlanCorrector）1 回のタイムアウト。
                              # 分解より短くするのは、訂正解釈が会話の応答を塞ぐ位置に在るため
                              # （計画確認中の発話は訂正解釈 → 通常会話の順に流れる。設計書 §10.2.1）。
                              # ya-ta が詰まったときに llm_timeout_sec（300 秒）まで会話が無応答に
                              # なるのを避け、打ち切って通常会話へ落とす
  llm_think: false            # 分解・分類・リスク判定の思考無効化。qwen3.6:27b は思考ありで分解
                              # 281 秒/3352 トークン（timeout 300 秒とニアミス・旧 deepseek 58 秒
                              # より大幅悪化）を実測。think=false の品質は分解構造の実機確認で判断
  num_ctx: 32768              # コンテキスト長。Mac mini 64GB での sa-ru 同居のため上限（256K）で
                              # 常駐させず 32K に制限（旧 deepseek 実測: 128K=常駐47GB → 32K=26GB。
                              # qwen3.6:27b の実常駐は deploy 後に §7.4 ランブックで実測・記録）。
                              # ※ コードは HTTP API で num_ctx を渡さないため、実効値は
                              #   モデル側 Modelfile の PARAMETER num_ctx 32768 に焼き込んで担保する
                              #   （構築手順書 04 §1-2 参照。初期投入時に PyInfra が自動焼込）。

# ルーティング写像（light/heavy 2値 → execution × depth 直交2軸）
# ya-ta は execution/depth/confidence の生判定のみ返し、モデルへの写像は orchestrator が
# 本テーブルを唯一の源として行う（ya-ta はモデル名を決めない＝関心の分離）。
routing:
  # confidence がこの値未満なら「迷い」とみなし matrix の low 側（sonnet）へ落とす。
  # 暫定値。判定ログ（YaTaLogger）の実データで較正する（設計書 §2.2「閾値・rubric は実データで較正」）
  confidence_threshold: 0.8

  # execution × depth × confidence → モデル（設計書 §2.2 写像テーブル）
  #   high = confidence >= confidence_threshold, low = confidence < threshold
  #   depth 省略時は unspecified を用いる（agent のみ）。inline は depth 不問
  matrix:
    inline:
      high: gemma       # ローカル純生成で完結
      low: haiku        # 生成だが迷い → 安価な API で確実に
    agent:
      shallow:
        high: haiku     # 浅いエージェント作業
        low: sonnet     # 迷いの落下先
      deep:
        high: opus      # 深い設計・難所
        low: sonnet     # 迷いの落下先
      unspecified:      # depth 省略（判断がつかない）
        high: sonnet    # 中位・万能
        low: sonnet

  # 昇格ラダー — 実行時に worker が難所に当たった / ESCALATE 申告 / 例外・タイムアウト時に
  # 段階的にモデルを上げて再実行する。現モデルがラダー上にあれば次段、ラダー外(gemma)なら先頭から。
  # 暫定の段構成。判定ログの過昇格/過小昇格の実データで較正する（設計書 §2.2）
  escalation:
    ladder: [haiku, sonnet, opus]

# モデル登録 — ルーティング先の定義
# キー名 = ユーザーが :モデル名 で指定する名前（完全一致）
#
# methods: 対応する呼び出し経路（実行アダプタ）の配列
#   - headless:   claude -p（非対話・stream-json）+ PreToolUse フック承認。Claude Code 専用
#   - pty:        SSH + PTY ラッパー（pexpect + tmux）。agy 対話等、y/n 介入が要る汎用対話 CLI 用
#   - subprocess: SSH + subprocess 単発実行。マルチモーダル単発・cross-review・フォールバックなど対話不要なもの
# 複数指定可（例: gemini は pty と subprocess の両方に対応）。
# 経路選択は orchestrator がタスクの性質（対話 / 単発、cross-review、マルチモーダル）から動的に決める。
#
# command: worker CLI の起動コマンド名（PTY ラッパー / subprocess 共通で使用）
#   - 通常は vendor から自動推測される（anthropic → claude、google → gemini 等）
#   - 自動推測を上書きしたい場合のみ明示記述する（複数 CLI 提供ベンダー・自前 CLI 等）
models:
  opus:
    full_name: "claude-opus-4.8"
    type: api
    vendor: anthropic
    methods: [headless]
    command: claude
    model_flag: "--model opus" # heavy デフォルト（明示指定必須。claude CLI 既定は端末の ~/.claude/settings.json
                                # の model 設定に従うため無指定だと Opus 4.8 が保証されない。実機検証で確認済）
    capabilities: [code, design, reasoning, implementation]
    description: "重量タスクの既定。探索・試行錯誤・ツール使用を伴う作業"

  fable:
    full_name: "claude-fable-5"
    type: api
    vendor: anthropic
    methods: [headless]
    command: claude
    model_flag: "--model fable"   # claude CLI の --model はエイリアス（fable/opus/sonnet/haiku）を取る。
                                   # full_name の "claude-fable-5" は不可（実機検証で拒否を確認）
    capabilities: [code, design, reasoning, implementation]
    description: "最難関タスク用。:fable で明示指定（難易度自動振り分けは Phase2）"

  opus4.6:
    full_name: "claude-opus-4.6"
    type: api
    vendor: anthropic
    methods: [headless]
    command: claude
    model_flag: ""
    capabilities: [code, design, reasoning, implementation]
    description: "重量タスク。探索・試行錯誤・ツール使用を伴う作業"

  sonnet:
    full_name: "claude-sonnet-4.6"
    type: api
    vendor: anthropic
    methods: [headless]
    command: claude
    model_flag: "--model sonnet"   # エイリアス指定（"sonnet-4.6"は無効値・実機検証で拒否を確認）
    capabilities: [code, reasoning]
    description: "中量タスク。Opus より高速・低コスト"

  haiku:
    full_name: "claude-haiku-4.5"
    type: api
    vendor: anthropic
    methods: [headless]
    command: claude
    model_flag: "--model haiku"   # エイリアス指定（"haiku-4.5"は無効値・実機検証で拒否を確認）
    capabilities: [light-task, qa]
    description: "軽量タスク。高速応答"

  gemini:
    full_name: "gemini-3.5-flash"
    type: api
    vendor: google
    methods: [pty, subprocess]   # heavy 対話 = pty、高度なマルチモーダル解析単発 / cross-review / フォールバック = subprocess
    command: agy                 # Antigravity CLI（Gemini CLI の後継）。認証は macOS keychain 依存（設計書 §8.5/§8.6）
    keychain_auth: true          # 認証が macOS keychain 依存 → SSH 直実行不可。GUI 起源 tmux 内で実行（§8.6）
    model_flag: "-p"   # agy: -p=非対話単発。--model は付加しない — subprocess 経路は run_model_subprocess が
                        # プロンプトを model_flag の末尾に追記するため "-p --model X <prompt>" の語順になり、
                        # agy の -p は次トークンをプロンプト値として消費する実装のため --model の文字列自体を
                        # プロンプトとして誤消費し本来のプロンプトが黙って破棄される（実機検証で再現・2026-07-03）。
                        # agy 既定モデルが 3.5 Flash のため --model 省略でも要件（Flash 応答）を満たす
    capabilities: [multimodal-analysis, code, reasoning]
    capability_description: |
      - 動画・音声・画像の高度な解析（理解）を含むタスク → model: "gemini"
        （基本的な解析はローカル gemma4 が担当。生成は Phase 2 — 設計書 §2.4 参照）
      - heavy 対話タスクのセカンドオピニオン → cross-review
      - Opus 障害時のフォールバック（テキスト・コード）
    description: "Gemini 既定（3.5 Flash）。高速・低コストで高度なマルチモーダル解析 + heavy 対話"

  gemini-pro:
    full_name: "gemini-3.1-pro"
    type: api
    vendor: google
    methods: [pty, subprocess]
    command: agy
    keychain_auth: true
    model_flag: "-p --model gemini-3.1-pro"   # agy: 最上位を明示選択（Phase2 未着手・現状無効。理由2件:
                                                # (a) subprocess 経路は語順が "-p --model X <prompt>" になり
                                                #     プロンプトが破棄される（gemini 側コメント参照）。
                                                # (b) 語順を正しても（"-p <prompt> --model X"）agy 1.0.16 は
                                                #     --model で実際に 3.1 Pro へ切替わらない（自己申告が常に
                                                #     3.5 Flash のまま。実機検証で再現・2026-07-03）
    capabilities: [multimodal-analysis, code, reasoning]
    capability_description: |
      - 複雑・創造的タスクで Gemini の最上位が要るとき → model: "gemini-pro"
      - 1M トークン級の長文脈が要るタスク
    description: "Gemini 最難関用（3.1 Pro）。:gemini-pro で明示指定（自動振り分けは Phase2）"

  gemma:
    full_name: "gemma-4-31b"
    type: local
    methods: [subprocess]
    command: ollama              # ollama run gemma4:31b の形で呼び出す
    model_id: "gemma4:31b"
    capabilities: [inline-generation, qa]   # inline 純生成専用へ降格。
                                             # ファイル読み取り・フォーマット変換は capability から外した
                                             # （ツール文脈が要る作業は agent レーンが担う）
    description: "ローカル軽量。inline 純生成専用（外部通信不要）"

  # 外部サービスの追加例:
  # suno:
  #   full_name: "suno-v4"
  #   type: api
  #   vendor: suno
  #   methods: [subprocess]
  #   command: suno
  #   capabilities: [music-generation]
  #   capability_description: |
  #     - 音楽の作曲・編曲・生成を含むタスク → model: "suno"
  #   description: "音楽生成"

# 並行実行制御
concurrency:
  # 重量モデル（methods に pty を含むモデル）の同時実行数上限。
  # 起動時のブートストラップ値（実行時は qu-e のリソース最適化通知 §8.14 で動的増減する）。
  # Phase 6 の実機検証で MBP のリソース消費を計測して確定する（qu-e.yaml の上限値と揃える）。
  max_heavy_instances: 3

# フォールバック設定（昇格ラダー routing.escalation.ladder による段階昇格）
# primary モデル（matrix で解決）が失敗 / ESCALATE 申告 / 例外・タイムアウト時、ladder の
# 次段へ昇格して再実行する。max_fallback_attempts は「primary を起点とした最大昇格段数」を制限。
# 値の意味: 昇格回数（primary は含まない）
#   0 = 昇格なし（primary のみ）、1 = primary + 1 段、N = primary + N 段
# 未指定（コメントアウト）の場合: ladder の末尾（opus）まで昇格（無制限）
# ユーザーが `:モデル名` を明示指定した場合は昇格しない（指定モデル尊重）
fallback:
  # max_fallback_attempts: 1     # 値を指定して制限する場合のみ有効化

# 判定ログ
logging:
  decision_log_dir: "/opt/taka-ma/logs"
